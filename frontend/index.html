<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />
    <meta name="description"
          content="Smart Skill & Live Learning Module by Gous org" />
    <title>Smart Skill &amp; Live Learning Module — Gous org</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com"
          crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
          rel="stylesheet" />

    <!-- Dark mode anti-flash script -->
    <script>
      (function() {
        try {
          var t = localStorage.getItem('ssllm_theme') || 'system';
          var r = document.documentElement;
          if (t === 'dark') {
            r.classList.add('dark');
          } else if (t === 'system') {
            var p = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (p) r.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
