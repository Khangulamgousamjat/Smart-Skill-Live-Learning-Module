<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('ssllm_theme') || 'system';
          var root = document.documentElement;
          if (theme === 'dark') {
            root.classList.add('dark');
          } else if (theme === 'system') {
            var prefersDark = window.matchMedia(
              '(prefers-color-scheme: dark)'
            ).matches;
            if (prefersDark) root.classList.add('dark');
          }
        } catch(e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
      content="Smart Skill & Live Learning Module —
      Manage intern skill development, live lectures,
      real-world projects, and certifications. By Gous org.">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <title>Smart Skill & Live Learning Module — Gous org</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/source/main.jsx"></script>
  </body>
</html>
